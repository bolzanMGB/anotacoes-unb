site_name: Anotações UnB

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference


markdown_extensions:
  - admonition           # habilita !!! note, !!! example, etc.
  - pymdownx.details     # permite admonitions “dobráveis”
  - pymdownx.superfences # permite cercas de código dentro de admonitions
  - pymdownx.highlight   # títulos em blocos de código e numeração de linhas
  - attr_list            # permite atributos { } em elementos, se quiser

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

